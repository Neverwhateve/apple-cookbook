name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aliyun-ecs-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Validate content
        run: pnpm validate:content

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Configure SSH
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_SSH_KEY: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
        run: |
          test -n "$ALIYUN_ECS_HOST"
          test -n "$ALIYUN_ECS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ALIYUN_ECS_SSH_KEY" > ~/.ssh/aliyun_ecs
          chmod 600 ~/.ssh/aliyun_ecs
          ssh-keyscan -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_HOST" >> ~/.ssh/known_hosts

      - name: Update ECS checkout
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/apple-cookbook' }}
        run: |
          test -n "$ALIYUN_ECS_USER"
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "APP_DIR='$APP_DIR' BRANCH='main' GITHUB_SHA='$GITHUB_SHA' bash -lc 'cd \"\$APP_DIR\" && if [[ -n \$(git status --porcelain) ]]; then git stash push --include-untracked -m \"pre-deploy-\$GITHUB_SHA\"; fi && git pull --ff-only origin \"\$BRANCH\"'"

      - name: Configure immediate feedback synchronization
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/apple-cookbook' }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME || 'apple-cookbook' }}
          APPLE_COOKBOOK_GITHUB_TOKEN: ${{ secrets.APPLE_COOKBOOK_GITHUB_TOKEN }}
        run: |
          test -n "$APPLE_COOKBOOK_GITHUB_TOKEN"
          printf '%s\n' "$APPLE_COOKBOOK_GITHUB_TOKEN" | \
            ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
              "APP_DIR='$APP_DIR' SERVICE_NAME='$SERVICE_NAME' bash -lc 'cd \"\$APP_DIR\" && SERVICE_NAME=\"\$SERVICE_NAME\" bash scripts/configure-feedback-dispatch-token.sh'"

      - name: Deploy on ECS
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/apple-cookbook' }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME || 'apple-cookbook' }}
          LOCAL_HEALTH_URL: ${{ vars.LOCAL_HEALTH_URL || 'http://127.0.0.1:3000' }}
          FEEDBACK_DATA_DIR: ${{ vars.FEEDBACK_DATA_DIR || '/var/lib/apple-cookbook' }}
          FEEDBACK_SERVICE_USER: ${{ vars.FEEDBACK_SERVICE_USER || 'applecookbook' }}
          FEEDBACK_SERVICE_GROUP: ${{ vars.FEEDBACK_SERVICE_GROUP || 'applecookbook' }}
        run: |
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "APP_DIR='$APP_DIR' SERVICE_NAME='$SERVICE_NAME' LOCAL_HEALTH_URL='$LOCAL_HEALTH_URL' FEEDBACK_DATA_DIR='$FEEDBACK_DATA_DIR' FEEDBACK_SERVICE_USER='$FEEDBACK_SERVICE_USER' FEEDBACK_SERVICE_GROUP='$FEEDBACK_SERVICE_GROUP' bash -lc 'cd \"\$APP_DIR\" && bash scripts/repair-feedback-storage.sh && bash scripts/deploy-ecs.sh --skip-pull'"

      - name: Verify production URL
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://cookbook.wuxiela.fun' }}
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent --show-error --max-time 10 "$PRODUCTION_URL" | grep -q "Apple Cookbook"; then
              echo "Production health check passed: $PRODUCTION_URL"
              exit 0
            fi

            sleep 3
          done

          echo "Production health check failed: $PRODUCTION_URL" >&2
          exit 1
