name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aliyun-ecs-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Configure SSH
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_SSH_KEY: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
        run: |
          test -n "$ALIYUN_ECS_HOST"
          test -n "$ALIYUN_ECS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ALIYUN_ECS_SSH_KEY" > ~/.ssh/aliyun_ecs
          chmod 600 ~/.ssh/aliyun_ecs
          ssh-keyscan -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on ECS
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/apple-cookbook' }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME || 'apple-cookbook' }}
        run: |
          test -n "$ALIYUN_ECS_USER"
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "APP_DIR='$APP_DIR' SERVICE_NAME='$SERVICE_NAME' BRANCH='main' GITHUB_SHA='$GITHUB_SHA' bash -lc 'cd \"\$APP_DIR\" && if [[ -n \$(git status --porcelain) ]]; then git stash push --include-untracked -m \"pre-deploy-\$GITHUB_SHA\"; fi && git pull --ff-only origin \"\$BRANCH\" && bash scripts/deploy-ecs.sh --skip-pull'"
