name: Sync Feedback Intake

on:
  schedule:
    # Feed the every-2-hour maintenance cycle before its next :05 run.
    - cron: "35 * * * *"
  workflow_dispatch:
    inputs:
      feedback_id:
        description: "Feedback ID requesting immediate synchronization"
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: feedback-intake-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ECS feedback to GitHub issues
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_SSH_KEY: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
        run: |
          test -n "$ALIYUN_ECS_HOST"
          test -n "$ALIYUN_ECS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ALIYUN_ECS_SSH_KEY" > ~/.ssh/aliyun_ecs
          chmod 600 ~/.ssh/aliyun_ecs
          ssh-keyscan -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_HOST" >> ~/.ssh/known_hosts

      - name: Download feedback queue
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          FEEDBACK_DATA_DIR: ${{ vars.FEEDBACK_DATA_DIR || '/var/lib/apple-cookbook' }}
          FEEDBACK_SERVICE_USER: ${{ vars.FEEDBACK_SERVICE_USER || 'applecookbook' }}
        run: |
          test -n "$ALIYUN_ECS_USER"
          [[ "$FEEDBACK_SERVICE_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          mkdir -p intake
          printf -v remote_data_dir '%q' "$FEEDBACK_DATA_DIR"
          printf -v remote_service_user '%q' "$FEEDBACK_SERVICE_USER"
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "sudo -n -u $remote_service_user env FEEDBACK_DATA_DIR=$remote_data_dir bash -s" > intake/remote-feedback.tar <<'REMOTE'
          set -euo pipefail
          umask 077
          mkdir -p "$FEEDBACK_DATA_DIR/feedback"

          lock_path="$FEEDBACK_DATA_DIR/feedback/.queue.lock"
          lock_token="github-feedback-sync-$(date +%s)-$$-$RANDOM"
          deadline=$((SECONDS + 15))
          while ! mkdir -m 700 "$lock_path" 2>/dev/null; do
            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for feedback queue lock." >&2
              exit 1
            fi
            sleep 0.1
          done
          printf '{"token":"%s","pid":%s,"acquiredAt":"%s"}\n' \
            "$lock_token" "$$" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$lock_path/owner.json"
          release_lock() {
            if grep -Fq "\"token\":\"$lock_token\"" "$lock_path/owner.json" 2>/dev/null; then
              rm -rf "$lock_path"
            fi
          }
          trap release_lock EXIT

          cd "$FEEDBACK_DATA_DIR"
          touch feedback/inbox.jsonl feedback/archive.jsonl feedback/synced-github-issues.txt
          tar -cf - feedback/inbox.jsonl feedback/archive.jsonl feedback/synced-github-issues.txt
          REMOTE
          tar -xf intake/remote-feedback.tar -C intake

      - name: Ensure labels
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create P0 --color B60205 --description "Highest priority feedback intake" || true
          gh label create feedback-intake --color 1D76DB --description "Submitted through Apple Cookbook feedback" || true
          gh label create content-bug --color D93F0B --description "Content accuracy or troubleshooting bug" || true

      - name: Close archived P0 feedback issues
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ ! -s intake/feedback/archive.jsonl ]]; then
            echo "No archived feedback submissions found."
            exit 0
          fi

          while IFS= read -r submission; do
            id=$(jq -r '.id // empty' <<<"$submission")
            [[ -n "$id" ]] || continue
            status=$(jq -r '.status // "open"' <<<"$submission")
            [[ "$status" == "resolved" || "$status" == "dismissed" ]] || continue

            issue_number=$(
              gh issue list \
                --state open \
                --label P0 \
                --label feedback-intake \
                --limit 200 \
                --json number,body \
                --jq ".[] | select(.body | contains(\"Feedback ID: \`$id\`\")) | .number" \
                | head -n 1
            )

            if [[ -z "$issue_number" ]]; then
              continue
            fi

            gh issue close "$issue_number" --comment "Archived from the admin feedback queue as \`$status\`; removed from active P0 harvest intake."
          done < intake/feedback/archive.jsonl

      - name: Archive active feedback with closed GitHub issues
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          FEEDBACK_DATA_DIR: ${{ vars.FEEDBACK_DATA_DIR || '/var/lib/apple-cookbook' }}
          FEEDBACK_SERVICE_USER: ${{ vars.FEEDBACK_SERVICE_USER || 'applecookbook' }}
        run: |
          set -euo pipefail
          [[ "$FEEDBACK_SERVICE_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          : > intake/closed-feedback-ids.txt

          if [[ ! -s intake/feedback/inbox.jsonl ]]; then
            echo "No active feedback submissions found."
            exit 0
          fi

          while IFS= read -r submission; do
            id=$(jq -r '.id // empty' <<<"$submission")
            [[ -n "$id" ]] || continue
            status=$(jq -r '.status // "open"' <<<"$submission")
            [[ "$status" == "open" || "$status" == "in_progress" ]] || continue

            issue_state=$(
              gh issue list \
                --state all \
                --label P0 \
                --label feedback-intake \
                --limit 200 \
                --json body,state \
                --jq ".[] | select(.body | contains(\"Feedback ID: \`$id\`\")) | .state" \
                | head -n 1
            )

            if [[ "$issue_state" == "CLOSED" ]]; then
              echo "$id" >> intake/closed-feedback-ids.txt
            fi
          done < intake/feedback/inbox.jsonl

          if [[ ! -s intake/closed-feedback-ids.txt ]]; then
            echo "No active feedback has closed GitHub issues."
            exit 0
          fi

          scp -i ~/.ssh/aliyun_ecs -P "$ALIYUN_ECS_PORT" \
            intake/closed-feedback-ids.txt "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST:/tmp/apple-cookbook-closed-feedback-ids.txt"

          printf -v remote_data_dir '%q' "$FEEDBACK_DATA_DIR"
          printf -v remote_service_user '%q' "$FEEDBACK_SERVICE_USER"
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "sudo -n -u $remote_service_user env FEEDBACK_DATA_DIR=$remote_data_dir bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          mkdir -p "$FEEDBACK_DATA_DIR/feedback"

          lock_path="$FEEDBACK_DATA_DIR/feedback/.queue.lock"
          lock_token="github-feedback-sync-$(date +%s)-$$-$RANDOM"
          deadline=$((SECONDS + 15))
          while ! mkdir -m 700 "$lock_path" 2>/dev/null; do
            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for feedback queue lock." >&2
              exit 1
            fi
            sleep 0.1
          done
          printf '{"token":"%s","pid":%s,"acquiredAt":"%s"}\n' \
            "$lock_token" "$$" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$lock_path/owner.json"
          release_lock() {
            if grep -Fq "\"token\":\"$lock_token\"" "$lock_path/owner.json" 2>/dev/null; then
              rm -rf "$lock_path"
            fi
          }
          trap release_lock EXIT

          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const dir = `${process.env.FEEDBACK_DATA_DIR}/feedback`;
          const inbox = `${dir}/inbox.jsonl`;
          const archive = `${dir}/archive.jsonl`;
          const closedIds = new Set(fs.readFileSync('/tmp/apple-cookbook-closed-feedback-ids.txt', 'utf8').split(/\r?\n/).filter(Boolean));
          const read = (file) => fs.existsSync(file) ? fs.readFileSync(file, 'utf8').split(/\r?\n/).filter(Boolean).map((line) => JSON.parse(line)) : [];
          const active = read(inbox);
          const archived = read(archive);
          const archivedIds = new Set(archived.map((item) => item.id));
          const now = new Date().toISOString();
          const toArchive = [];
          const nextActive = [];

          for (const item of active) {
            if (closedIds.has(item.id)) {
              toArchive.push({ ...item, status: 'resolved', updatedAt: now, adminNote: 'GitHub P0 issue 已关闭，自动归档。' });
            } else {
              nextActive.push(item);
            }
          }

          const nextArchive = [...toArchive.filter((item) => !archivedIds.has(item.id)), ...archived];
          const writeAtomic = (file, items) => {
            const temp = `${dir}/.${file.split('/').pop()}.${process.pid}.${crypto.randomUUID()}.tmp`;
            const body = items.map((item) => JSON.stringify(item)).join('\n') + (items.length ? '\n' : '');
            const descriptor = fs.openSync(temp, 'wx', 0o600);
            try {
              fs.writeFileSync(descriptor, body, 'utf8');
              fs.fsyncSync(descriptor);
            } finally {
              fs.closeSync(descriptor);
            }
            fs.renameSync(temp, file);
          };
          writeAtomic(inbox, nextActive);
          writeAtomic(archive, nextArchive);
          NODE
          REMOTE
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "rm -f /tmp/apple-cookbook-closed-feedback-ids.txt"

      - name: Create issues for new P0 feedback
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          : > intake/newly-synced-ids.txt

          if [[ ! -s intake/feedback/inbox.jsonl ]]; then
            echo "No feedback submissions found."
            exit 0
          fi

          while IFS= read -r submission; do
            id=$(jq -r '.id // empty' <<<"$submission")
            [[ -n "$id" ]] || continue
            status=$(jq -r '.status // "open"' <<<"$submission")
            [[ "$status" == "open" ]] || continue

            if grep -Fxq "$id" intake/feedback/synced-github-issues.txt; then
              continue
            fi

            title=$(jq -r '.title // "Untitled feedback"' <<<"$submission")
            kind=$(jq -r '.kind // "unknown"' <<<"$submission")
            created_at=$(jq -r '.createdAt // "unknown"' <<<"$submission")
            description=$(jq -r '.description // ""' <<<"$submission")
            customer_words=$(jq -r '.customerWords // ""' <<<"$submission")
            device=$(jq -r '.device // ""' <<<"$submission")
            source_title=$(jq -r '.sourceTitle // ""' <<<"$submission")
            source_url=$(jq -r '.sourceUrl // ""' <<<"$submission")

            issue_title="P0 feedback: ${title}"
            issue_title="${issue_title:0:220}"

            cat > intake/issue-body.md <<BODY
          Feedback ID: \`$id\`

          Priority: P0
          Type: \`$kind\`
          Created: \`$created_at\`
          Device: ${device:-未填写}

          ## Submitted Content

          $description

          ## Customer Words

          ${customer_words:-未填写}

          ## Related Source

          - Title: ${source_title:-未填写}
          - URL: ${source_url:-未填写}

          ## Handling Rule

          This item came from website feedback and must be handled before routine source harvest work. Research official Apple sources first, then compare community reports, update or create Cookbook content, record sources, and close this issue with the resolution summary.
          BODY

            labels=(--label P0 --label feedback-intake)
            if [[ "$kind" == "content_bug" ]]; then
              labels+=(--label content-bug)
            fi

            gh issue create \
              --title "$issue_title" \
              "${labels[@]}" \
              --body-file intake/issue-body.md

            echo "$id" >> intake/newly-synced-ids.txt
          done < intake/feedback/inbox.jsonl

      - name: Mark synced feedback on ECS
        if: success()
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          FEEDBACK_DATA_DIR: ${{ vars.FEEDBACK_DATA_DIR || '/var/lib/apple-cookbook' }}
          FEEDBACK_SERVICE_USER: ${{ vars.FEEDBACK_SERVICE_USER || 'applecookbook' }}
        run: |
          [[ "$FEEDBACK_SERVICE_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          if [[ ! -s intake/newly-synced-ids.txt ]]; then
            echo "No new feedback IDs synced."
            exit 0
          fi

          scp -i ~/.ssh/aliyun_ecs -P "$ALIYUN_ECS_PORT" \
            intake/newly-synced-ids.txt "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST:/tmp/apple-cookbook-newly-synced-ids.txt"

          printf -v remote_data_dir '%q' "$FEEDBACK_DATA_DIR"
          printf -v remote_service_user '%q' "$FEEDBACK_SERVICE_USER"
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "sudo -n -u $remote_service_user env FEEDBACK_DATA_DIR=$remote_data_dir bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          mkdir -p "$FEEDBACK_DATA_DIR/feedback"

          lock_path="$FEEDBACK_DATA_DIR/feedback/.queue.lock"
          lock_token="github-feedback-sync-$(date +%s)-$$-$RANDOM"
          deadline=$((SECONDS + 15))
          while ! mkdir -m 700 "$lock_path" 2>/dev/null; do
            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for feedback queue lock." >&2
              exit 1
            fi
            sleep 0.1
          done
          printf '{"token":"%s","pid":%s,"acquiredAt":"%s"}\n' \
            "$lock_token" "$$" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$lock_path/owner.json"
          release_lock() {
            if grep -Fq "\"token\":\"$lock_token\"" "$lock_path/owner.json" 2>/dev/null; then
              rm -rf "$lock_path"
            fi
          }
          trap release_lock EXIT

          synced_path="$FEEDBACK_DATA_DIR/feedback/synced-github-issues.txt"
          synced_temp=$(mktemp "$FEEDBACK_DATA_DIR/feedback/.synced-github-issues.XXXXXX.tmp")
          touch "$synced_path"
          sort -u "$synced_path" /tmp/apple-cookbook-newly-synced-ids.txt > "$synced_temp"
          chmod 600 "$synced_temp"
          mv "$synced_temp" "$synced_path"
          REMOTE
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "rm -f /tmp/apple-cookbook-newly-synced-ids.txt"
